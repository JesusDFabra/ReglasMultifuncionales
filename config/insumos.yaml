# Configuración de insumos para reglas de cajeros multifuncionales
# Rutas: directorios.insumos puede ser relativo al proyecto o ruta absoluta.
# Cada insumo puede tener directorio (opcional) para sobreescribir la carpeta base.

directorios:
  insumos: "insumos_excel"   # Carpeta de insumos (relativa al proyecto) o ruta absoluta

# Insumos: patron (y opcional directorio) definen la ruta. {fecha} = DD_MM_YYYY.
insumos:
  gestion_erestrad:
    patron: "gestion/gestion_{fecha}_erestrad.xlsx"
    # directorio: "insumos_excel"   # opcional: subcarpeta o ruta absoluta
    descripcion: "Archivo de gestión - erestrad"
    activo: true
  consolidado_cajeros_cuadrados:
    patron: "cuadrados/consolidado_cajeros_cuadrados_{fecha}.xlsx"
    descripcion: "Consolidado de cajeros cuadrados"
    activo: true
  arqueos_mf:
    patron_mes_anio: "{mm:02d}- ARQUEOS MF {mes_nombre} {yyyy}.xlsx"   # {mm:02d}, {mes_nombre}, {yyyy}
    descripcion: "Arqueos MF del mes (lectura y edicion)"
    activo: true
  historico_cuadre_cajeros_sucursales:
    patron: "HISTORICO_CUADRE_CAJEROS_SUCURSALES.xlsx"
    descripcion: "Historico cuadre cajeros sucursales (fecha desde sobrantes)"
    activo: true

# Fecha de proceso (se puede sobreescribir; por defecto se usa la del día)
proceso:
  fecha: "23_02_2026"   # DD_MM_YYYY - dejar vacío o usar fecha actual

# Umbrales para reglas de Remanente (en pesos). Parametrizables.
remanente:
  # Faltante mínimo para aplicar ajustes 810291 (sucursal): solo si faltante > este valor se aplica.
  faltante_minimo_para_810291: 20000000   # 20M
  # Faltante máximo para ir a cuenta sobrantes: si faltante <= este valor, se busca en sobrantes; si > y no hay más 810291, Gestión manual.
  faltante_limite_sobrantes: 25000000     # 25M
  # Tope para contabilizar sobrantes en 279510020. Si el sobrante absoluto supera este valor,
  # no se contabiliza automaticamente y se marca ACLARAR DIFERENCIA Y REPETIR EL ARQUEO.
  sobrante_maximo_contabilizar_279510020: 50000000   # 50M
  # Si tras 770500/810291 y cruces con sobrantes el faltante residual es <= este valor, no repetir arqueo:
  # "Gestión a Realizar" = contabilización centralizada cuenta faltantes 168710093 (fecha = ejecución / fecha descarga).
  faltante_maximo_grabar_cuenta_faltantes: 20000
  # Rango sobrantes: si true, "hasta" = dia del arqueo; si false, "hasta" = dia anterior al arqueo.
  sobrantes_incluir_dia_arqueo: true
  # Temporal: si true, al procesar cuadrados (fecha descarga) se crea/rellena la columna "paso_a_paso_regla" en ARQUEOS MF.
  columna_paso_a_paso_arqueos_mf: true

# Reglas aplicadas al archivo de gestion al momento de leerlo.
reglas_gestion:
  diario_sobrantes_extremos:
    activo: true
    # Tramo alto: abs(sobrantes) >= limite_sobrante_negativo.
    limite_sobrante_negativo: 1000000000
    # Tramo medio: limite_sobrante_medio_minimo <= abs(sobrantes) < limite_sobrante_negativo.
    limite_sobrante_medio_minimo: 50000000
  # Solo DIARIO sin fila ARQUEO del mismo cajero; 0 < abs(sobrantes) <= limite (no sobreescribe si ya calificado).
  diario_sobrante_bajo_sin_arqueo:
    activo: true
    limite_max_abs_sobrante: 3000000

# Conexión a base de datos NACIONAL (ODBC). Igual que reglas_dispensadores.
base_datos:
  usar_bd: true
  servidor: "NACIONAL"
  usuario_nal: "NJDFABRA"
  clave_nal: "JESUS2026"
